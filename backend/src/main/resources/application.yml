server:
  port: 8080

spring:
  # H2 内存数据库 (开发/测试环境)
  datasource:
    url: jdbc:h2:mem:english_learn;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# JWT 配置
jwt:
  secret: YourSuperSecretKeyForJWTTokenGenerationThatShouldBeAtLeast256BitsLong
  expiration: 86400000  # 24小时

# 文件上传配置
file:
  upload-dir: ./uploads
  max-size: 10MB

logging:
  level:
    com.english: DEBUG
    org.springframework.security: INFO
